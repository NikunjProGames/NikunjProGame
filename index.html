<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching NPG...</title>
    <style>
        /* Deep dark background to make neon pop */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0214;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* HTML: <div class="loader"></div> */
.loader {
  height: 60px;
  aspect-ratio: 2;
  border-bottom: 3px solid #0000;
  background: 
    linear-gradient(90deg,#524656 50%,#0000 0)
    -25% 100%/50% 3px repeat-x border-box;
  position: relative;
  animation: l3-0 .75s linear infinite;
}
.loader:before {
  content: "";
  position: absolute;
  inset: auto 42.5% 0;
  aspect-ratio: 1;
  border-radius: 50%;
  background: #CF4647;
  animation: l3-1 .75s cubic-bezier(0,900,1,900) infinite;
}
@keyframes l3-0 {
  to {background-position: -125% 100%}
}
@keyframes l3-1 {
  0%,2% {bottom: 0%}
  98%,to {bottom:.1%}
}

        /* Neon Text Styling */
        .loading-text {
            margin-top: 40px;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 
                         0 0 10px #bc13fe, 
                         0 0 20px #bc13fe, 
                         0 0 40px #bc13fe;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes pulse {
            from {
                opacity: 0.6;
                text-shadow: 0 0 5px #fff, 0 0 10px #bc13fe, 0 0 20px #bc13fe;
            }
            to {
                opacity: 1;
                text-shadow: 0 0 7px #fff, 0 0 15px #bc13fe, 0 0 30px #bc13fe, 0 0 50px #bc13fe;
            }
        }
    </style>
</head>
<body>

    <div class="loader">
        </div>
        
        <div class="loading-text">Launching NPG</div>
   

    <script>
        // Wait 3 seconds (3000 milliseconds) for the animation, then redirect
        setTimeout(function() {
            // REPLACE THIS URL WITH YOUR ACTUAL NEW WEBSITE ADDRESS
            window.location.href = "https://nikunjprogames.github.io/"; 
        }, 3000);
    </script>

</body>
</html>
